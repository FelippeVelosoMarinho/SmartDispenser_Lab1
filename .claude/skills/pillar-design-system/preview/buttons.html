<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_preview.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body{padding:24px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{height:48px;padding:0 20px;border-radius:var(--radius);font-family:var(--font-sans);font-size:15px;font-weight:600;border:1.5px solid transparent;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all var(--dur) var(--ease-out)}
  .btn i{font-size:18px}
  .primary{background:var(--primary);color:#fff}
  .secondary{background:var(--surface);color:var(--ink);border-color:var(--border)}
  .ghost{background:transparent;color:var(--primary)}
  .danger{background:var(--danger);color:#fff}
  .btn:hover.primary{background:var(--primary-hover)}
  .focus{box-shadow:var(--focus-ring)}
  .disabled{background:var(--surface-sunk);color:var(--ink-4);border-color:var(--surface-dim);cursor:not-allowed}
  .tag{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);width:60px;flex-shrink:0}
</style></head>
<body>
  <div class="row"><div class="tag">primary</div>
    <button class="btn primary"><i class="ph-duotone ph-check"></i>Log this dose</button>
    <button class="btn primary focus">Focused</button>
    <button class="btn disabled">Disabled</button>
  </div>
  <div class="row"><div class="tag">secondary</div>
    <button class="btn secondary"><i class="ph-duotone ph-clock"></i>Remind me later</button>
    <button class="btn ghost">Skip</button>
    <button class="btn danger"><i class="ph-duotone ph-warning-octagon"></i>Report missed</button>
  </div>
</body></html>

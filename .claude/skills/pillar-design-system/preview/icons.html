<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_preview.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body{padding:20px 24px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .ic{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .ic i{font-size:28px;color:var(--primary)}
  .ic .n{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);text-align:center}
  .note{font-size:12px;color:var(--ink-3);margin-top:10px;text-align:center}
</style></head>
<body>
  <div class="grid">
    <div class="ic"><i class="ph-duotone ph-pill"></i><div class="n">pill</div></div>
    <div class="ic"><i class="ph-duotone ph-clock"></i><div class="n">clock</div></div>
    <div class="ic"><i class="ph-duotone ph-check-circle"></i><div class="n">check-circle</div></div>
    <div class="ic"><i class="ph-duotone ph-warning-octagon"></i><div class="n">warning-octagon</div></div>
    <div class="ic"><i class="ph-duotone ph-bell-ringing"></i><div class="n">bell-ringing</div></div>
    <div class="ic"><i class="ph-duotone ph-skip-forward"></i><div class="n">skip-forward</div></div>
    <div class="ic"><i class="ph-duotone ph-user-circle"></i><div class="n">user-circle</div></div>
    <div class="ic"><i class="ph-duotone ph-gear-six"></i><div class="n">gear-six</div></div>
    <div class="ic"><i class="ph-duotone ph-arrows-clockwise"></i><div class="n">refill</div></div>
    <div class="ic"><i class="ph-duotone ph-notebook"></i><div class="n">journal</div></div>
    <div class="ic"><i class="ph-duotone ph-lifebuoy"></i><div class="n">help</div></div>
    <div class="ic"><i class="ph-duotone ph-heart-straight"></i><div class="n">caregiver</div></div>
  </div>
  <div class="note">Phosphor · duotone · 24px default · always paired with a label</div>
</body></html>

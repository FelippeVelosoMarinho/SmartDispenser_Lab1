<!doctype html><html><head><meta charset="utf-8"><title>Touch targets</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{padding:24px;display:flex;gap:16px;align-items:flex-end;justify-content:center}
  .box{display:flex;flex-direction:column;align-items:center;gap:10px}
  .t{background:var(--primary);color:#fff;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-weight:600;font-size:15px;padding:0 20px}
  .cap{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-align:center}
  .cap b{color:var(--ink);display:block}
</style></head>
<body>
  <div class="box"><div class="t" style="height:44px">Continue</div><div class="cap"><b>44px</b>target-min · WCAG AAA</div></div>
  <div class="box"><div class="t" style="height:48px">Continue</div><div class="cap"><b>48px</b>target-cozy · default</div></div>
  <div class="box"><div class="t" style="height:56px">Continue</div><div class="cap"><b>56px</b>target-spacious · primary mobile</div></div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><title>Type · numeric</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{padding:22px 24px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
  .block{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:140px}
  .caption{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-bottom:6px}
  .num{font-family:"Atkinson Hyperlegible",sans-serif;font-variant-numeric:tabular-nums;color:var(--ink);line-height:1}
  .unit{font-family:var(--font-sans);font-size:15px;color:var(--ink-3);font-weight:500}
</style></head>
<body>
  <div class="block"><div class="caption">dosage</div><div class="num" style="font-size:44px;font-weight:700">10<span class="unit"> mg</span></div></div>
  <div class="block"><div class="caption">time</div><div class="num" style="font-size:40px;font-weight:700">8:00<span class="unit"> AM</span></div></div>
  <div class="block"><div class="caption">streak</div><div class="num" style="font-size:44px;font-weight:700">14<span class="unit"> days</span></div></div>
  <div class="block"><div class="caption">doses today</div><div class="num" style="font-size:44px;font-weight:700">3<span class="unit">/4</span></div></div>
</body></html>

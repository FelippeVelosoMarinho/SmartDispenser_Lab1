<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:220px;padding:24px;gap:24px}
  .logo-box{display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:28px 32px;flex:1}
  .logo-box--dark{background:var(--primary)}
  .logo-box img{height:56px;width:auto;display:block}
</style></head>
<body>
  <div class="logo-box"><img src="../assets/logo-pillar.svg" alt="Pillar"></div>
  <div class="logo-box logo-box--dark"><img src="../assets/logo-pillar-inverse.svg" alt="Pillar"></div>
</body></html>

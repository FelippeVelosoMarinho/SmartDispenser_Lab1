<!doctype html><html><head><meta charset="utf-8"><title>Voice examples</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{padding:22px 24px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
  .c{border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border-subtle)}
  .c--no{background:#FAE6E5;border-color:#F3C2C0}
  .c--yes{background:#E4F1EA;border-color:#BFDDCC}
  .tag{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .c--no .tag{color:var(--danger-ink)}
  .c--yes .tag{color:var(--success-ink)}
  .q{font-size:15px;color:var(--ink);line-height:1.45}
</style></head>
<body>
  <div class="row">
    <div class="c c--no"><div class="tag">don't</div><div class="q">"Oops! You missed a dose! 😬"</div></div>
    <div class="c c--yes"><div class="tag">do</div><div class="q">"That's okay. Your 8:00 AM dose is still waiting."</div></div>
  </div>
  <div class="row">
    <div class="c c--no"><div class="tag">don't</div><div class="q">"ADHERENCE ALERT"</div></div>
    <div class="c c--yes"><div class="tag">do</div><div class="q">"One dose missed yesterday"</div></div>
  </div>
  <div class="row">
    <div class="c c--no"><div class="tag">don't</div><div class="q">"Great job!!! 🎉"</div></div>
    <div class="c c--yes"><div class="tag">do</div><div class="q">"Nice. That's 7 days in a row."</div></div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{padding:20px 24px}
  .row{display:flex;align-items:center;gap:12px;padding:4px 0}
  .bar{height:14px;background:var(--primary);border-radius:3px}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);width:92px;flex-shrink:0}
  .tag b{color:var(--ink)}
</style></head>
<body>
  <div class="row"><div class="tag"><b>space-1</b> 4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tag"><b>space-2</b> 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tag"><b>space-3</b> 12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tag"><b>space-4</b> 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tag"><b>space-5</b> 20</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="tag"><b>space-6</b> 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tag"><b>space-7</b> 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tag"><b>space-8</b> 40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="tag"><b>space-9</b> 56</div><div class="bar" style="width:56px"></div></div>
  <div class="row"><div class="tag"><b>space-10</b> 72</div><div class="bar" style="width:72px"></div></div>
  <div class="row"><div class="tag"><b>space-11</b> 96</div><div class="bar" style="width:96px"></div></div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_preview.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
  label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block}
  .group{max-width:520px}
  .input{height:48px;width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:0 14px;font:17px var(--font-sans);color:var(--ink)}
  .input--focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .input--error{border-color:var(--danger);background:var(--danger-soft)}
  .help{font-size:13px;color:var(--ink-3);margin-top:4px}
  .err{color:var(--danger-ink);display:flex;align-items:center;gap:6px;font-size:13px;margin-top:4px}
  .row{display:flex;gap:14px}
  .row .group{flex:1}
</style></head>
<body>
  <div class="row">
    <div class="group">
      <label>Medication name</label>
      <input class="input input--focus" value="Sertraline">
      <div class="help">Case-insensitive. Generic or brand is fine.</div>
    </div>
    <div class="group">
      <label>Dose</label>
      <input class="input" value="10 mg">
    </div>
  </div>
  <div class="group">
    <label>Refill reminder</label>
    <input class="input input--error" value="">
    <div class="err"><i class="ph-duotone ph-warning-octagon"></i>Pick a day so we can remind you.</div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body{padding:20px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
  .sw .color{height:64px}
  .sw .meta{padding:8px 10px;background:var(--surface);font-family:var(--font-mono);font-size:10.5px;line-height:1.45}
  .sw .name{color:var(--ink);font-weight:700}
  .sw .hex{color:var(--ink-3)}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="color" style="background:#E3EDF5"></div><div class="meta"><div class="name">primary-soft</div><div class="hex">#E3EDF5</div></div></div>
    <div class="sw"><div class="color" style="background:#7FB3D9"></div><div class="meta"><div class="name">primary-300</div><div class="hex">#7FB3D9</div></div></div>
    <div class="sw"><div class="color" style="background:#2B5F8A"></div><div class="meta"><div class="name">primary</div><div class="hex">#2B5F8A</div></div></div>
    <div class="sw"><div class="color" style="background:#234E72"></div><div class="meta"><div class="name">primary-hover</div><div class="hex">#234E72</div></div></div>
    <div class="sw"><div class="color" style="background:#1C3F5C"></div><div class="meta"><div class="name">primary-press</div><div class="hex">#1C3F5C</div></div></div>
  </div>
</body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pillar — Companion app UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#EEF2F6;gap:40px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Phone.jsx"></script>
<script type="text/babel" src="Today.jsx"></script>
<script type="text/babel" src="LogSheet.jsx"></script>
<script type="text/babel" src="MedDetail.jsx"></script>
<script type="text/babel" src="TabBar.jsx"></script>
<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState('today');
  const [sheet, setSheet] = React.useState(false);
  return (
    <>
      <Phone>
        {screen === 'today' && <Today onLog={()=>setSheet(true)} onOpen={()=>setScreen('detail')}/>}
        {screen === 'detail' && <MedDetail onBack={()=>setScreen('today')}/>}
        {sheet && <LogSheet onDismiss={()=>setSheet(false)}/>}
        <TabBar active={screen==='detail'?'meds':'today'} onChange={id => setScreen(id==='meds'?'detail':'today')}/>
      </Phone>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
